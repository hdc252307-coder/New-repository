# ============================================
# H2 Database（ファイルモード）
# ============================================
# Spring Boot が直接ローカルファイルを開く方式。
# 絶対パスにして、起動場所による「別DBを見てしまう」事故を防ぐ。
# AUTO_SERVER=TRUE で、Spring 起動中でも別プロセスの
# H2 Console（Desktop版）から同一DBへ接続しやすくする。
# AUTO_SERVER_PORT を固定するとポート競合で起動失敗するため指定しない。
spring.datasource.url=jdbc:h2:file:C:/Users/HDC252307/PersonalTaskManagerProject/demo/data/demo;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ============================================
# H2 Console（ブラウザで DB を見る用）
# ============================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================
# JPA / Hibernate 設定
# ============================================
# update：既存テーブルは維持しつつ、必要な変更だけ自動反映。
spring.jpa.hibernate.ddl-auto=update

# SQL をログに出す（デバッグ用）
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 用の方言
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ============================================
# ログ設定（必要に応じて調整）
# ============================================
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.root=INFO

# ============================================
# 開発効率向上（テンプレート/静的リソース即時反映）
# ============================================
spring.thymeleaf.cache=false
spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false

# ============================================
# 暗号化キー（メモ）
# ============================================
# title/description などの暗号化には環境変数 APP_CRYPTO_KEY を使用する。
# 未設定時は開発用デフォルトキーで動作するため、本番では必ず設定すること。
