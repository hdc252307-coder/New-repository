<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>スケジュール追加</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="center-container">
    <div class="card">
    <h1 class="title">スケジュール追加</h1>
    <p class="subtitle">予定を登録してください</p>

        <form th:action="@{/schedule/new}" th:object="${schedule}" method="post" class="form-area">

            <div class="form-group">
                <label>タイトル</label>
                <input type="text" th:field="*{title}" required>
            </div>

            <div class="form-group">
                <label>開始日時</label>
                <input type="datetime-local" th:field="*{startDateTime}" required>
            </div>

            <div class="form-group">
                <label>終了日時</label>
                <input type="datetime-local" th:field="*{endDateTime}">
            </div>

            <div class="form-group">
                <label>メモ</label>
                <textarea th:field="*{description}" rows="3"></textarea>
            </div>

            <button type="submit" class="btn primary">保存</button>
        </form>

        <a href="/calendar" class="link-text">カレンダーに戻る</a>

    </div>
</div>

</body>
</html>
