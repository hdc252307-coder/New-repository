<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>スケジュール追加</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="page-header task-list-header app-fixed-header">
    <a href="/guide" class="help-bubble">使い方</a>
    <div class="header-center">
        <a href="/tasks" class="header-logo-link" title="タスク一覧へ戻る">
            <h1 class="page-title">スケジュール追加</h1>
        </a>
        <span class="user-badge" th:text="${'ユーザー: ' + username}"></span>
    </div>
    <form th:action="@{/logout}" method="post" style="margin-left:auto;">
        <button type="submit" class="logout-btn">ログアウト</button>
    </form>
</div>

    <div class="center-container with-fixed-header">
    <div class="card standard-form-card">
        <h1 class="title">スケジュール追加</h1>
        <p class="subtitle">予定を登録してください</p>

        <form th:action="@{/schedule/new}" method="post" class="form-area">

            <div class="form-group">
                <label>タイトル</label>
                <input type="text" name="title" required>
            </div>

            <div class="form-group">
                <label class="remember">
                    <input type="checkbox" name="allDay" value="true" id="allDayToggle">
                    <span>終日</span>
                </label>
            </div>

            <div class="form-group" id="timedFields">
                <label>開始日時</label>
                <input type="datetime-local" name="startDateTime" id="startDateTime">
            </div>

            <div class="form-group" id="timedFieldsEnd">
                <label>終了日時</label>
                <input type="datetime-local" name="endDateTime" id="endDateTime">
            </div>

            <div class="form-group" id="alldayFields" style="display:none;">
                <label>開始日</label>
                <input type="date" name="startDate" id="startDate">
            </div>

            <div class="form-group" id="alldayFieldsEnd" style="display:none;">
                <label>終了日（その日を含む）</label>
                <input type="date" name="endDate" id="endDate">
            </div>

            <div class="form-group">
                <label>メモ</label>
                <textarea name="description" rows="3"></textarea>
            </div>

            <div class="form-group">
                <label>繰り返し</label>
                <select name="recurrenceType" id="recurrenceType">
                    <option value="none" selected>なし</option>
                    <option value="weekly">毎週</option>
                    <option value="monthly">毎月</option>
                </select>
            </div>

            <div class="form-group" id="recurrenceIntervalGroup" style="display:none;">
                <label>繰り返し間隔</label>
                <p id="recurrenceIntervalHint" class="form-hint" style="margin:0 0 6px 0; color:#6b7a99; font-size:12px;">1回ごとに繰り返します</p>
                <input type="number" name="recurrenceInterval" id="recurrenceInterval" min="1" value="1">
            </div>

            <div class="form-group" id="recurrenceUntilGroup" style="display:none;">
                <label>繰り返し終了日（任意）</label>
                <input type="date" name="recurrenceUntilDate" id="recurrenceUntilDate">
            </div>

            <button type="submit" class="btn primary">保存</button>
        </form>

        <a href="/calendar" class="link-text">カレンダーに戻る</a>
    </div>
</div>

<script>
(function () {
    var cb = document.getElementById('allDayToggle');
    var timed = document.getElementById('timedFields');
    var timedEnd = document.getElementById('timedFieldsEnd');
    var allday = document.getElementById('alldayFields');
    var alldayEnd = document.getElementById('alldayFieldsEnd');
    var st = document.getElementById('startDateTime');
    var en = document.getElementById('endDateTime');
    var sd = document.getElementById('startDate');
    var ed = document.getElementById('endDate');
    var recurrenceType = document.getElementById('recurrenceType');
    var recurrenceIntervalGroup = document.getElementById('recurrenceIntervalGroup');
    var recurrenceUntilGroup = document.getElementById('recurrenceUntilGroup');
    var recurrenceInterval = document.getElementById('recurrenceInterval');
    var recurrenceIntervalHint = document.getElementById('recurrenceIntervalHint');
    function sync() {
        var on = cb.checked;
        timed.style.display = on ? 'none' : '';
        timedEnd.style.display = on ? 'none' : '';
        allday.style.display = on ? '' : 'none';
        alldayEnd.style.display = on ? '' : 'none';
        if (on && sd && !sd.value && st && st.value) {
            sd.value = st.value.slice(0, 10);
        }
        if (on && sd && !ed.value && sd.value) {
            ed.value = sd.value;
        }
        if (st) st.required = !on;
        if (en) en.required = !on;
        if (sd) sd.required = on;
        if (ed) ed.required = on;
    }
    function syncAllDayDates() {
        if (!cb.checked || !sd || !ed) return;
        if (!ed.value || ed.value < sd.value) {
            ed.value = sd.value;
        }
    }
    function syncRecurrenceHint() {
        if (!recurrenceIntervalHint || !recurrenceType || !recurrenceInterval) return;
        var every = recurrenceInterval.value && recurrenceInterval.value.trim() !== '' ? recurrenceInterval.value : '1';
        if (recurrenceType.value === 'weekly') {
            recurrenceIntervalHint.textContent = every + '週間ごとに繰り返します';
        } else if (recurrenceType.value === 'monthly') {
            recurrenceIntervalHint.textContent = every + 'か月ごとに繰り返します';
        } else {
            recurrenceIntervalHint.textContent = '1回ごとに繰り返します';
        }
    }
    function syncRecurrence() {
        var recurring = recurrenceType && recurrenceType.value !== 'none';
        recurrenceIntervalGroup.style.display = recurring ? '' : 'none';
        recurrenceUntilGroup.style.display = recurring ? '' : 'none';
        syncRecurrenceHint();
    }
    cb.addEventListener('change', sync);
    if (sd) sd.addEventListener('change', syncAllDayDates);
    if (recurrenceInterval) recurrenceInterval.addEventListener('input', syncRecurrenceHint);
    if (recurrenceType) recurrenceType.addEventListener('change', syncRecurrence);
    sync();
    syncRecurrence();
})();

(function () {
    var pickerInputs = document.querySelectorAll('input[type="date"], input[type="datetime-local"]');
    pickerInputs.forEach(function (input) {
        function openPicker() {
            if (typeof input.showPicker === 'function') {
                try {
                    input.showPicker();
                } catch (e) {
                    // フォールバック: 非対応/制約時は通常挙動に任せる
                }
            }
        }
        input.addEventListener('pointerdown', openPicker);
        input.addEventListener('focus', openPicker);
    });
})();
</script>

</body>
</html>
