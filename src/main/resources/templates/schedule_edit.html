<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>スケジュール編集</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<!-- タスク編集画面と同じレイアウト（center-container + card）に合わせる。
     これで余白・横幅・カード見た目が共通化され、画面ごとの差異を減らせる。 -->
<div class="center-container">
<div class="card">
<h1 class="title">スケジュール編集</h1>
<p class="subtitle">内容を修正してください</p>

<!-- タスク編集と同じ form-area を使用して、フォーム部品の間隔・幅を統一する。 -->
<form th:action="@{'/schedule/' + ${schedule.id} + '/update'}" method="post" class="form-area">

    <!-- ★ id は URL で渡すので hidden は不要（残しても害はないが、整理のため削除） -->
    <!-- <input type="hidden" name="id" th:value="${schedule.id}"> -->

    <!-- ★ username は Controller 側で userDetails から取得するので不要 -->
    <!-- <input type="hidden" name="username" th:value="${schedule.username}"> -->

    <!-- ★ returnTo を使わないので削除 -->
    <!-- <input type="hidden" name="returnTo" th:value="${returnTo}"> -->

    <div class="form-group">
        <label>タイトル</label>
        <input type="text" name="title" th:value="${schedule.title}" required>
    </div>

    <div class="form-group">
        <label>開始日時</label>
        <!-- SpEL では \' ではなく '' でクォートをエスケープする。 -->
        <!-- datetime-local に合わせるため、T は ''T'' としてリテラル指定する。 -->
        <input type="datetime-local" name="startDateTime"
               th:value="${#temporals.format(schedule.startDateTime, 'yyyy-MM-dd''T''HH:mm')}"
               required>
    </div>

    <div class="form-group">
        <label>終了日時</label>
        <!-- 開始日時と同じ理由で SpEL 互換の書式へ統一。 -->
        <input type="datetime-local" name="endDateTime"
               th:value="${#temporals.format(schedule.endDateTime, 'yyyy-MM-dd''T''HH:mm')}"
               required>
    </div>

    <button type="submit" class="btn primary">更新する</button>
</form>

<a href="/calendar" class="link-text">カレンダーに戻る</a>

</div>
</div>

</body>
</html>
