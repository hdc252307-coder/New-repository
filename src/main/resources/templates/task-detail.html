<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>タスク詳細</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v='20260501a')}">
</head>
<body>

<div class="page-header task-list-header app-fixed-header">
    <a href="/guide" class="help-bubble">使い方</a>
    <div class="header-center">
        <a href="/tasks" class="header-logo-link" title="タスク一覧へ戻る">
            <h1 class="page-title">タスク詳細</h1>
        </a>
        <span class="user-badge" th:text="${'ユーザー: ' + username}"></span>
    </div>
    <form th:action="@{/logout}" method="post" style="margin-left:auto;">
        <button type="submit" class="logout-btn">ログアウト</button>
    </form>
</div>

<div class="center-container with-fixed-header">
    <div class="card"
         th:classappend="${'task-color--' + (task.colorKey != null ? task.colorKey : 'default')}">

        <h1 class="title">タスク詳細</h1>
        <p class="subtitle">タスクの内容を確認できます</p>

        <div class="task-body" style="text-align: left; margin-top: 20px;">

            <p><strong>タイトル：</strong>
                <span th:text="${task.title}"></span>
            </p>

            <p><strong>説明：</strong><br>
                <span th:text="${task.description}"></span>
            </p>

            <p><strong>期限：</strong>
                <span th:text="${task.dueDate}"></span>
            </p>

            <p><strong>所要時間：</strong>
                <span th:text="${task.estimatedMinutes != null ? task.estimatedMinutes + ' 分' : '-'}"></span>
            </p>

            <p><strong>優先度：</strong>
                <span th:text="${task.priority == 1 ? '1(低)' : (task.priority == 3 ? '3(中)' : (task.priority == 5 ? '5(高)' : task.priority))}"></span>
            </p>

            <p><strong>表示色：</strong>
                <span th:text="${(task.colorKey != null and task.colorKey != '' and task.colorKey != 'default') ? task.colorKey : '標準'}"></span>
            </p>

            <p><strong>作成日時：</strong>
                <!-- 画面表示は時刻まで不要なので、日付（yyyy-MM-dd）のみ表示する。 -->
                <span th:text="${#temporals.format(task.createdAt, 'yyyy-MM-dd')}"></span>
            </p>

            <p><strong>更新日時：</strong>
                <!-- 作成日時と同じフォーマットにそろえ、一覧性を上げる。 -->
                <span th:text="${#temporals.format(task.updatedAt, 'yyyy-MM-dd')}"></span>
            </p>

        </div>

        <div class="button-group" style="margin-top: 30px;">
            <a th:if="${returnTo != null and !#strings.isEmpty(returnTo)}"
               th:href="@{/tasks/{id}/edit(id=${task.id},returnTo=${returnTo})}"
               class="btn primary">編集する</a>
            <a th:unless="${returnTo != null and !#strings.isEmpty(returnTo)}"
               th:href="@{/tasks/{id}/edit(id=${task.id})}"
               class="btn primary">編集する</a>
            <form th:action="@{'/tasks/' + ${task.id} + '/toggle-complete'}" method="post" class="full-width-form">
                <button type="submit" class="btn secondary"
                        th:text="${task.done} ? '未完了に戻す' : '完了にする'"></button>
            </form>
            <a th:if="${returnTo != null and !#strings.isEmpty(returnTo)}"
               th:href="${returnTo}"
               class="btn secondary">前の画面に戻る</a>
            <a th:if="${task.quickTodo != null and task.quickTodo}"
               th:href="@{/tasks/quick}" class="btn secondary">クイックToDoに戻る</a>
            <a th:unless="${task.quickTodo != null and task.quickTodo}"
               th:href="@{/tasks}" class="btn secondary">一覧に戻る</a>
        </div>

    </div>
</div>

</body>
</html>
