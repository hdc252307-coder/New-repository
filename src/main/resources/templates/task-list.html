<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>タスク一覧</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="page-container task-list-page with-fixed-header">

    <!-- ★ page-header 正しく閉じる -->
    <div class="page-header task-list-header app-fixed-header">
        <a href="/guide" class="help-bubble">使い方</a>
        <div class="header-center">
            <a href="/tasks" class="header-logo-link" title="タスク一覧へ戻る">
                <h1 class="page-title">タスク一覧</h1>
            </a>
            <span class="user-badge" th:text="${'ユーザー: ' + username}"></span>
        </div>
        <form th:action="@{/logout}" method="post" style="margin-left:auto;">
            <button type="submit" class="logout-btn">ログアウト</button>
        </form>
    </div> <!-- ← ここで確実に閉じる -->
    <div class="task-list-toolbar">
        <div class="task-list-toolbar-inner">
            <button type="button" id="openOnboardingBtn" class="btn secondary task-list-toolbar-btn">チュートリアルを見る</button>
            <div class="task-list-toolbar-end">
            <a href="/tasks/quick" class="task-list-todo-btn" title="クイックToDoを開く">Todo</a>
            <div class="notify-dropdown">
                <button type="button"
                        id="notifyToggleBtn"
                        class="notify-toggle-btn"
                        th:classappend="${notifications != null and !#lists.isEmpty(notifications)} ? ' has-alerts'"
                        aria-expanded="false"
                        aria-controls="notifyPanel"
                        title="お知らせ"
                        aria-label="お知らせを開く">
                    <span class="notify-toggle-glyph" aria-hidden="true">!</span>
                    <span class="notify-toggle-badge"
                          th:if="${notifications != null and !#lists.isEmpty(notifications)}"
                          th:text="${#lists.size(notifications)}">0</span>
                </button>
                <div id="notifyPanel"
                     class="notify-panel"
                     role="region"
                     aria-label="お知らせ"
                     hidden>
                    <div class="notify-panel-body"
                         th:classappend="${notifications == null or #lists.isEmpty(notifications)} ? ' is-empty'">
                        <p class="notify-panel-title">お知らせ</p>
                        <ul th:if="${notifications != null and !#lists.isEmpty(notifications)}">
                            <li th:each="n : ${notifications}" th:classappend="${n.level == 'warn'} ? ' notify-warn' : ''">
                                <a th:if="${n.link != null}" th:href="${n.link}" th:text="${n.message}"></a>
                                <span th:if="${n.link == null}" th:text="${n.message}"></span>
                            </li>
                        </ul>
                        <p class="notify-empty"
                           th:if="${notifications == null or #lists.isEmpty(notifications)}">
                            該当なし（期限切れ・3日以内の期限・24時間以内の予定があれば最大3件ずつ表示）
                        </p>
                    </div>
                </div>
            </div>
            </div>
        </div>
    </div>

    <div class="task-list-stack">
        <section class="task-sort-panel">
            <form class="task-list-filters" th:action="@{/tasks}" method="get">
                <p class="task-list-section-note">以下の並び・絞り込みは<strong>通常タスク</strong>のみです。</p>
                <input type="hidden" th:if="${showOnboarding}" name="showOnboarding" value="true">
                <div class="task-list-filters-row">
                    <label class="task-list-filter-field">
                        <span class="task-list-filter-label">並び順</span>
                        <select name="sort">
                            <option value="priority" th:selected="${sort == 'priority'}">優先度（高→低）</option>
                            <option value="due" th:selected="${sort == 'due'}">期限（近い順）</option>
                            <option value="created" th:selected="${sort == 'created'}">作成日（新しい順）</option>
                            <option value="title" th:selected="${sort == 'title'}">タイトル（あいうえお）</option>
                            <option value="estimated" th:selected="${sort == 'estimated'}">見積時間（長い順）</option>
                        </select>
                    </label>
                    <label class="task-list-filter-field">
                        <span class="task-list-filter-label">色</span>
                        <select name="colorKey">
                            <option value="" th:selected="${filterColorKey == null or filterColorKey == ''}">すべて</option>
                            <option value="default" th:selected="${filterColorKey == 'default'}">デフォルト</option>
                            <option value="blue" th:selected="${filterColorKey == 'blue'}">青</option>
                            <option value="teal" th:selected="${filterColorKey == 'teal'}">ティール</option>
                            <option value="amber" th:selected="${filterColorKey == 'amber'}">アンバー</option>
                            <option value="rose" th:selected="${filterColorKey == 'rose'}">ローズ</option>
                            <option value="violet" th:selected="${filterColorKey == 'violet'}">バイオレット</option>
                            <option value="slate" th:selected="${filterColorKey == 'slate'}">スレート</option>
                        </select>
                    </label>
                    <label class="task-list-filter-field">
                        <span class="task-list-filter-label">優先度</span>
                        <select name="priority">
                            <option value="" th:selected="${filterPriority == null or filterPriority == ''}">すべて</option>
                            <option value="5" th:selected="${filterPriority == '5'}">高 (5)</option>
                            <option value="3" th:selected="${filterPriority == '3'}">中 (3)</option>
                            <option value="1" th:selected="${filterPriority == '1'}">低 (1)</option>
                        </select>
                    </label>
                    <label class="task-list-filter-field">
                        <span class="task-list-filter-label">期限</span>
                        <select name="due">
                            <option value="all" th:selected="${filterDue == 'all'}">すべて</option>
                            <option value="overdue" th:selected="${filterDue == 'overdue'}">期限切れ</option>
                            <option value="soon" th:selected="${filterDue == 'soon'}">7日以内（今日含む）</option>
                            <option value="none" th:selected="${filterDue == 'none'}">期限なし</option>
                        </select>
                    </label>
                </div>
                <div class="task-list-filters-actions">
                    <button type="submit" class="btn secondary small">適用</button>
                    <a th:href="${showOnboarding} ? @{/tasks(showOnboarding=true)} : @{/tasks}" class="btn secondary small">リセット</a>
                </div>
            </form>
        </section>

    <!-- おすすめタスク -->
    <div class="recommend-box" th:if="${not #lists.isEmpty(recommendedTasks)}">
        <h3>💡 今日のおすすめタスク</h3>
        <ul>
            <li th:each="t : ${recommendedTasks}"
                th:classappend="${t.dueDate != null and t.dueDate.isBefore(today)} ? ' recommend-expired' : ''">
                <span th:if="${t.dueDate != null and t.dueDate.isBefore(today)}">⚠ </span>
                <a th:href="@{/tasks/{id}(id=${t.id})}" th:text="${t.title}"></a>
            </li>
        </ul>
    </div>

    </div>

    <p class="task-list-empty-msg" th:if="${#lists.isEmpty(tasks)}">
        条件に一致するタスクはありません。絞り込みを変えるか
        <a th:href="${showOnboarding} ? @{/tasks(showOnboarding=true)} : @{/tasks}">リセット</a>してください。
    </p>

    <!-- タスク一覧 -->
    <div class="task-list"
         th:if="${not #lists.isEmpty(tasks)}"
         th:classappend="${#lists.size(tasks) == 1} ? ' single-card' : ''">
        <div th:each="task : ${tasks}" class="task-card"
             th:classappend="${'task-color--' + (task.colorKey != null ? task.colorKey : 'default')}">

            <div class="task-header">
                <span class="task-title" th:text="${task.title}"></span>

                <span class="priority" th:classappend="' p' + ${task.priority}">
                    <span th:text="${task.priority}"></span>
                </span>
            </div>

            <div class="task-body">
                <p class="task-deadline">
                    期限：<span th:text="${task.dueDate}"></span>
                </p>
                <p class="task-time">
                    所要時間：<span th:text="${task.estimatedMinutes}"></span> 分
                </p>
            </div>

            <div class="task-actions">
                <a th:href="@{'/tasks/' + ${task.id}}" class="btn small primary">詳細</a>
                <a th:href="@{'/tasks/' + ${task.id} + '/edit'}" class="btn small secondary">編集</a>
                <form th:action="@{'/tasks/' + ${task.id} + '/toggle-complete'}" method="post" style="display:inline;">
                    <button type="submit" class="btn small secondary"
                            th:text="${task.done} ? '未完了' : '完了'"></button>
                </form>
            </div>

        </div>
    </div>

    <!-- ボタン類 -->
    <a href="/tasks/new" class="btn primary add-task-btn">＋ 新しいタスク</a>
    <a href="/tasks/completed" class="btn secondary add-task-btn">完了済みタスク</a>
    <a href="/calendar" class="btn calendar add-task-btn">カレンダー</a>
    <a th:href="@{/trash}" class="btn secondary add-task-btn task-list-trash-link">削除済み一覧</a>

</div>

<div id="onboardingOverlay" class="onboarding-overlay" style="display:none;"
     th:attr="data-auto-open=${onboardingAutoOpen},data-open-replay=${showOnboardingRequested}">
    <div class="onboarding-modal" role="dialog" aria-modal="true" aria-labelledby="onboardingTitle">
        <div class="onboarding-head">
            <h3 id="onboardingTitle">はじめての使い方ガイド</h3>
            <div id="onboardingStepCount" class="onboarding-step-count"></div>
        </div>

        <div class="onboarding-image-wrap">
            <img id="onboardingImage" class="onboarding-image" alt="操作説明スクリーンショット">
            <div id="onboardingFallback" class="onboarding-fallback" style="display:none;">
                画像を読み込めませんでした。スクリーンショットを `/img/onboarding/` に配置すると表示されます。
            </div>
        </div>

        <p id="onboardingText" class="onboarding-text"></p>

        <div class="onboarding-actions">
            <div class="onboarding-actions-left">
                <button type="button" id="onboardingSkipBtn" class="onboarding-btn secondary">次回から表示しない</button>
                <button type="button" id="onboardingCloseBtn" class="onboarding-btn secondary">閉じる</button>
            </div>
            <div class="onboarding-actions-right">
                <button type="button" id="onboardingPrevBtn" class="onboarding-btn secondary">戻る</button>
                <button type="button" id="onboardingNextBtn" class="onboarding-btn primary">次へ</button>
            </div>
        </div>
    </div>
</div>

<script>
(function () {
    var steps = [
        { image: '/img/onboarding/01-home.png', text: '最初にトップ画面からログインまたは新規登録を選びます。' },
        { image: '/img/onboarding/02-register.png', text: '新規登録ではユーザー名とパスワードを入力してアカウントを作成します。' },
        { image: '/img/onboarding/03-login.png', text: 'ログイン時に「ログイン情報を保持する」をONにすると再ログインの手間を減らせます。' },
        { image: '/img/onboarding/04-task-list-overview.png', text: 'タスク一覧では主要導線（新規作成、完了済み、カレンダー、削除済み）へ移動できます。' },
        { image: '/img/onboarding/05-task-new.png', text: 'タスク追加ではタイトル、期限、優先度、色、所要時間を設定できます。' },
        { image: '/img/onboarding/06-calendar-task-band.png', text: 'カレンダーではタスクの帯表示で、期間の見通しを確認できます。' },
        { image: '/img/onboarding/07-schedule-new.png', text: '予定追加では終日/時刻指定を使い分けて予定を登録できます。' },
        { image: '/img/onboarding/08-calendar-schedule-band.png', text: '予定を追加するとカレンダー帯にも反映され、タスクと一緒に把握できます。' },
        { image: '/img/onboarding/09-completed-tasks.png', text: '完了済みタスク画面では、履歴確認と未完了への戻し操作ができます。' },
        { image: '/img/onboarding/10-trash-list.png', text: '削除済み一覧では必要なデータを復元し、不要なら完全削除できます。' }
    ];

    var overlay = document.getElementById('onboardingOverlay');
    if (!overlay) return;

    var imageEl = document.getElementById('onboardingImage');
    var fallbackEl = document.getElementById('onboardingFallback');
    var textEl = document.getElementById('onboardingText');
    var countEl = document.getElementById('onboardingStepCount');
    var prevBtn = document.getElementById('onboardingPrevBtn');
    var nextBtn = document.getElementById('onboardingNextBtn');
    var closeBtn = document.getElementById('onboardingCloseBtn');
    var skipBtn = document.getElementById('onboardingSkipBtn');
    var openBtn = document.getElementById('openOnboardingBtn');

    var current = 0;

    function render() {
        var step = steps[current];
        countEl.textContent = 'STEP ' + (current + 1) + ' / ' + steps.length;
        textEl.textContent = step.text;
        fallbackEl.style.display = 'none';
        imageEl.style.display = '';
        imageEl.src = step.image;
        prevBtn.disabled = current === 0;
        nextBtn.textContent = current === steps.length - 1 ? '完了' : '次へ';
    }

    imageEl.onerror = function () {
        imageEl.style.display = 'none';
        fallbackEl.style.display = '';
    };

    function openModal() {
        current = 0;
        render();
        overlay.style.display = 'flex';
    }

    function closeModal() {
        overlay.style.display = 'none';
    }

    function markCompleted() {
        try {
            sessionStorage.removeItem('onboardingAutoSuppressed');
        } catch (e) { /* ignore */ }
        fetch('/tasks/onboarding/complete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
        }).catch(function () {});
    }

    prevBtn.addEventListener('click', function () {
        if (current > 0) {
            current -= 1;
            render();
        }
    });

    nextBtn.addEventListener('click', function () {
        if (current >= steps.length - 1) {
            markCompleted();
            closeModal();
            return;
        }
        current += 1;
        render();
    });

    closeBtn.addEventListener('click', function () {
        // 「閉じる」だけでは DB が更新されずリロードのたびに再表示されるため、
        // 同一ブラウザではセッション中は自動表示を抑止する（「チュートリアルを見る」からは開ける）
        try {
            sessionStorage.setItem('onboardingAutoSuppressed', '1');
        } catch (e) { /* private mode 等 */ }
        closeModal();
    });
    skipBtn.addEventListener('click', function () {
        markCompleted();
        closeModal();
    });
    if (openBtn) openBtn.addEventListener('click', openModal);

    if (overlay.dataset.openReplay === 'true') {
        openModal();
    } else if (overlay.dataset.autoOpen === 'true') {
        var suppressed = false;
        try {
            suppressed = sessionStorage.getItem('onboardingAutoSuppressed') === '1';
        } catch (e) { /* ignore */ }
        if (!suppressed) {
            openModal();
        }
    }
})();

(function () {
    var wrap = document.querySelector('.notify-dropdown');
    var btn = document.getElementById('notifyToggleBtn');
    var panel = document.getElementById('notifyPanel');
    if (!wrap || !btn || !panel) return;

    function setOpen(open) {
        btn.setAttribute('aria-expanded', open ? 'true' : 'false');
        btn.setAttribute('aria-label', open ? 'お知らせを閉じる' : 'お知らせを開く');
        if (open) {
            panel.removeAttribute('hidden');
            if (!wrap.classList.contains('notify-badge-cleared')) {
                wrap.classList.add('notify-badge-cleared');
                btn.classList.remove('has-alerts');
                var badge = btn.querySelector('.notify-toggle-badge');
                if (badge) badge.setAttribute('hidden', '');
            }
        } else {
            panel.setAttribute('hidden', '');
        }
        wrap.classList.toggle('is-open', open);
    }

    btn.addEventListener('click', function (e) {
        e.stopPropagation();
        setOpen(panel.hasAttribute('hidden'));
    });

    wrap.addEventListener('click', function (e) {
        e.stopPropagation();
    });

    document.addEventListener('click', function () {
        setOpen(false);
    });

    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && !panel.hasAttribute('hidden')) {
            setOpen(false);
        }
    });
})();
</script>

</body>
</html>
