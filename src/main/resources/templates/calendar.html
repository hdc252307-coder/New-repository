<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>カレンダー</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="calendar-page" th:attr="data-year=${yearMonth.year},data-month=${yearMonth.monthValue}">
    <div class="calendar-back">
        <a href="/tasks" class="link-text">← タスク一覧に戻る</a>
    </div>

    <div class="calendar-card">

    <div class="calendar-header">

        <a class="nav-btn"
           th:href="@{/calendar(year=${prevMonth.year}, month=${prevMonth.monthValue})}">
            ◀
        </a>

        <h2 class="calendar-title" th:text="${title}">2026年3月</h2>

        <a class="btn primary calendar-add-btn"
           th:href="@{/schedule/new(returnTo=${'/calendar?year=' + yearMonth.year + '&month=' + yearMonth.monthValue})}">＋ 新しい予定</a>

        <a class="nav-btn"
           th:href="@{/calendar(year=${nextMonth.year}, month=${nextMonth.monthValue})}">
            ▶
        </a>

    </div>

    <div class="calendar-weekdays">
        <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
    </div>

    <div class="calendar-body">
        <div class="calendar-week-unified"
             th:each="weekDates, weekStat : ${weeks}">

            <a class="day-cell"
               th:each="date : ${weekDates}"
               th:href="@{'/calendar/day?date=' + ${date}}"
               th:attr="data-date=${date}"
               th:style="|grid-row: 1;|"
               th:classappend="${(date.equals(T(java.time.LocalDate).now()) ? 'today ' : '') + (date.monthValue != yearMonth.monthValue ? 'outside-month' : '')}">

                <div class="date-number" th:text="${date.dayOfMonth}">1</div>
                <div class="day-overflow-indicator"
                     th:if="${dailyTotalCountMap != null and dailyTotalCountMap[date.toString()] != null and dailyTotalCountMap[date.toString()] > 3}"
                     th:text="${'+' + (dailyTotalCountMap[date.toString()] - 3)}"
                     th:title="${'この日の未表示: ' + (dailyTotalCountMap[date.toString()] - 3) + '件'}">
                    +1
                </div>

                <div class="items">
                    <div class="task-item task-item--undated"
                         th:each="t, iter : ${taskMap[date.toString()]}"
                         th:if="${iter.index < 3}"
                         th:classappend="${'task-color--' + (t.colorKey != null ? t.colorKey : 'default')}"
                         th:text="${t.title}">
                    </div>

                </div>
            </a>

            <div class="calendar-band-overlay"
                 th:if="${bandRowCounts.get(weekStat.index) + scheduleBandRowCounts.get(weekStat.index) > 0}"
                 th:style="|grid-template-rows: repeat(${bandRowCounts.get(weekStat.index) + scheduleBandRowCounts.get(weekStat.index)}, 18px);|">
                <a class="task-calendar-band"
                   th:each="seg : ${taskBandWeeks.get(weekStat.index)}"
                   th:href="@{/tasks/{id}(id=${seg.taskId})}"
                   th:classappend="${'task-color--' + seg.colorKey}"
                   th:style="|grid-row: ${seg.lane + 1}; grid-column: ${seg.colStart + 1} / ${seg.colEndInclusive + 2};|"
                   th:title="${seg.title}"
                   th:text="${seg.title}">
                </a>

                <a class="schedule-calendar-band"
                   th:each="seg : ${scheduleBandWeeks.get(weekStat.index)}"
                   th:href="@{/schedule/{id}/edit(id=${seg.scheduleId},returnTo=${'/calendar?year=' + yearMonth.year + '&month=' + yearMonth.monthValue})}"
                   draggable="true"
                   th:attr="data-schedule-id=${seg.scheduleId},data-occ-start=${seg.occurrenceStartDate}"
                   th:style="|grid-row: ${bandRowCounts.get(weekStat.index) + seg.lane + 1}; grid-column: ${seg.colStart + 1} / ${seg.colEndInclusive + 2};|"
                   th:title="${seg.title}"
                   th:text="${seg.title}">
                </a>
            </div>
        </div>
    </div>
    </div>
</div>

<script>
(function () {
    var dragging = null;

    document.querySelectorAll('.schedule-calendar-band').forEach(function (band) {
        band.addEventListener('dragstart', function (e) {
            dragging = {
                id: band.getAttribute('data-schedule-id'),
                occStart: band.getAttribute('data-occ-start')
            };
            if (e.dataTransfer) {
                e.dataTransfer.setData('text/plain', dragging.id || '');
                e.dataTransfer.effectAllowed = 'move';
            }
            band.classList.add('dragging');
        });
        band.addEventListener('dragend', function () {
            band.classList.remove('dragging');
            dragging = null;
            document.querySelectorAll('.day-cell.drop-target').forEach(function (c) {
                c.classList.remove('drop-target');
            });
        });
    });

    document.querySelectorAll('.day-cell').forEach(function (cell) {
        cell.addEventListener('dragover', function (e) {
            if (!dragging) return;
            e.preventDefault();
            cell.classList.add('drop-target');
        });
        cell.addEventListener('dragleave', function () {
            cell.classList.remove('drop-target');
        });
        cell.addEventListener('drop', function (e) {
            if (!dragging) return;
            e.preventDefault();
            cell.classList.remove('drop-target');
            var targetDate = cell.getAttribute('data-date');
            if (!targetDate || !dragging.id || !dragging.occStart) return;
            fetch('/schedule/' + dragging.id + '/move', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'targetDate=' + encodeURIComponent(targetDate)
                    + '&occurrenceStartDate=' + encodeURIComponent(dragging.occStart)
            }).then(function () {
                var page = document.querySelector('.calendar-page');
                var currentYear = page ? parseInt(page.getAttribute('data-year') || '0', 10) : 0;
                var currentMonth = page ? parseInt(page.getAttribute('data-month') || '0', 10) : 0;
                var moved = new Date(targetDate + 'T00:00:00');
                var movedYear = moved.getFullYear();
                var movedMonth = moved.getMonth() + 1;
                if (movedYear !== currentYear || movedMonth !== currentMonth) {
                    window.location.href = '/calendar?year=' + movedYear + '&month=' + movedMonth;
                } else {
                    window.location.reload();
                }
            }).catch(function () {});
        });
    });
})();
</script>

</body>
</html>
