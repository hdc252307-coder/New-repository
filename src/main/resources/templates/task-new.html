<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>タスク追加</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="page-container">

<h2 class="page-title">タスク追加</h2>

<form method="post" action="/tasks/add" class="form-area">

    <div class="form-group">
        <label>タイトル</label>
        <input type="text" name="title" required>
    </div>

    <div class="form-group">
        <label>期限</label>
        <input type="date" name="dueDate">
    </div>

    <div class="form-group priority-group">
        <label>優先度</label>
        <select name="priority">
            <option value="5">5</option>
            <option value="4">4</option>
            <option value="3">3</option>
            <option value="2">2</option>
            <option value="1">1</option>
        </select>
    </div>


    <div class="form-group">
        <label>所要時間（分）</label>
        <input type="number" name="estimatedMinutes" required>
    </div>

    <button type="submit" class="btn primary">追加</button>
</form>

<div class="back" style="text-align:center; margin-top:15px;">
    <a href="/tasks" class="link-text">← タスク一覧に戻る</a>
</div>

</body>
</html>
