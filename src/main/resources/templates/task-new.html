<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>タスク追加</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v='20260501a')}">
</head>
<body>

<div class="page-header task-list-header app-fixed-header">
    <a href="/guide" class="help-bubble">使い方</a>
    <div class="header-center">
        <a href="/tasks" class="header-logo-link" title="タスク一覧へ戻る">
            <h1 class="page-title">タスク追加</h1>
        </a>
        <span class="user-badge" th:text="${'ユーザー: ' + username}"></span>
    </div>
    <form th:action="@{/logout}" method="post" style="margin-left:auto;">
        <button type="submit" class="logout-btn">ログアウト</button>
    </form>
</div>

<div class="center-container with-fixed-header">
<div class="card standard-form-card">
<h1 class="title">タスク追加</h1>
<p class="subtitle">やることを登録してください</p>

<form method="post" action="/tasks/add" class="form-area">

    <div class="form-group">
        <label>タイトル</label>
        <input type="text" name="title" required>
    </div>

    <div class="form-group">
        <label>詳細</label>
        <textarea name="description" rows="3"></textarea>
    </div>

    <div class="form-group">
        <label>期限</label>
        <input type="date" name="dueDate" id="dueDateInput">
    </div>

    <div class="form-group">
        <label>優先度</label>
        <select name="priority">
            <option value="1">1(低)</option>
            <option value="2">2</option>
            <option value="3" selected>3(中)</option>
            <option value="4">4</option>
            <option value="5">5(高)</option>
        </select>
    </div>

    <div th:replace="~{fragments/task-color-fields :: swatches(selectedKey='default')}"></div>

    <div class="form-group">
        <label>所要時間（分）</label>
        <input type="number" name="estimatedMinutes" min="1">
    </div>

    <button type="submit" class="btn primary">追加</button>
</form>

<a href="/tasks" class="link-text">タスク一覧に戻る</a>

</div>
</div>
<script>
(function () {
    var pickerInputs = document.querySelectorAll('input[type="date"], input[type="datetime-local"]');
    pickerInputs.forEach(function (input) {
        function openPicker() {
            if (typeof input.showPicker === 'function') {
                try {
                    input.showPicker();
                } catch (e) {
                    // フォールバック: 非対応/制約時は通常挙動に任せる
                }
            }
        }
        input.addEventListener('pointerdown', openPicker);
        input.addEventListener('focus', openPicker);
    });
})();
</script>
</body>
</html>
