<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>タスク追加</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="center-container">
<div class="card">
<h1 class="title">タスク追加</h1>
<p class="subtitle">やることを登録してください</p>

<form method="post" action="/tasks/add" class="form-area">

    <div class="form-group">
        <label>タイトル</label>
        <input type="text" name="title" required>
    </div>

    <div class="form-group">
        <label>詳細</label>
        <textarea name="description" rows="3"></textarea>
    </div>

    <div class="form-group">
        <label>期限</label>
        <input type="date" name="dueDate">
    </div>

    <div class="form-group priority-group">
        <label>優先度</label>
        <select name="priority">
            <option value="1">1(低)</option>
            <option value="2">2</option>
            <option value="3" selected>3(中)</option>
            <option value="4">4</option>
            <option value="5">5(高)</option>
        </select>
    </div>


    <div class="form-group">
        <label>所要時間（分）</label>
        <input type="number" name="estimatedMinutes" required>
    </div>

    <button type="submit" class="btn primary">追加</button>
</form>

<a href="/tasks" class="link-text">タスク一覧に戻る</a>

</div>
</div>
</body>
</html>
